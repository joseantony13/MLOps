# python_env.yaml — MLflow python_env specification
# Referenced by MLproject. Defines the Python version and dependencies
# MLflow uses when running this project with: mlflow run .
#
# Docs: https://mlflow.org/docs/latest/projects.html#python-environment

python: "3.11"

# Packages installed before the project's own dependencies
build_dependencies:
  - pip
  - setuptools
  - wheel

# Project dependencies (mirrors requirements.txt)
dependencies:
  - scikit-learn==1.4.0
  - mlflow==2.10.0
  - dvc==3.48.4
  - pandas==2.2.0
  - numpy==1.26.3
  - joblib==1.3.2
  - pyyaml==6.0.1
  - python-dotenv==1.0.0
