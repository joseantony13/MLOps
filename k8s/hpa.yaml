# ─── Horizontal Pod Autoscaler ────────────────────────────────────────────────
# Scales mlops-model-api pods between 2 and 10 replicas based on
# CPU and memory utilization. Requires metrics-server to be installed
# in the cluster: kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mlops-model-api-hpa
  namespace: mlops
  labels:
    app: mlops-model-api
    component: autoscaler
spec:
  # ── Target ────────────────────────────────────────────────────────────────
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mlops-model-api

  # ── Replica bounds ────────────────────────────────────────────────────────
  minReplicas: 2
  maxReplicas: 10

  # ── Scaling Metrics ───────────────────────────────────────────────────────
  metrics:
    # Scale up when average CPU across pods exceeds 70%
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

    # Scale up when average memory across pods exceeds 80%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

  # ── Scaling Behavior ──────────────────────────────────────────────────────
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60       # Wait 60s before scaling up again
      policies:
        - type: Pods
          value: 2                          # Add at most 2 pods per scale event
          periodSeconds: 60
        - type: Percent
          value: 50                         # Or 50% of current replicas, whichever is larger
          periodSeconds: 60
      selectPolicy: Max

    scaleDown:
      stabilizationWindowSeconds: 300      # Wait 5 min before scaling down (avoid flapping)
      policies:
        - type: Pods
          value: 1                          # Remove at most 1 pod per scale event
          periodSeconds: 120
      selectPolicy: Min
