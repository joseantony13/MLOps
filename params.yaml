data:
  raw_path: data/raw/dataset.csv
  processed_path: data/processed/
  test_size: 0.2
  random_state: 42
  target_column: target

features:
  numerical:
    - feature_1
    - feature_2
    - feature_3
    - feature_4
    - feature_5
  categorical:
    - category_1
    - category_2

model:
  type: RandomForestClassifier
  params:
    n_estimators: 100
    max_depth: 10
    min_samples_split: 5
    min_samples_leaf: 2
    random_state: 42
    n_jobs: -1

training:
  cv_folds: 5
  scoring: f1_weighted
  model_output_path: models/model.joblib

mlflow:
  experiment_name: mlops-pipeline
  tracking_uri: http://mlflow-server:5000
  registered_model_name: production-classifier

evaluate:
  metrics:
    - accuracy
    - f1_weighted
    - precision_weighted
    - recall_weighted
  threshold:
    f1_weighted: 0.80
